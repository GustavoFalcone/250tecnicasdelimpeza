<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Material digital com +250 técnicas de limpeza profissional para diaristas, faxineiras e profissionais de limpeza. Pronto para imprimir e usar no dia a dia." />
    <meta property="og:title" content="+250 Técnicas de Limpeza Profissional" />
    <meta property="og:description" content="Material digital pronto para imprimir, consultar e usar na rotina de limpeza residencial e comercial leve." />
    <link rel="preconnect" href="https://cdn.utmify.com.br" />
    <link rel="dns-prefetch" href="https://cdn.utmify.com.br" />
    <link
      rel="preload"
      as="image"
      href="/images/hero.webp"
      fetchpriority="high"
    />
    <title>+250 Técnicas de Limpeza Profissional</title>
    <script>
      window.pixelId = "6a525b986e45b07a6d7d1a89";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
    <script>
      window.addEventListener(
        "click",
        function (event) {
          var trigger = event.target.closest && event.target.closest("[data-open-basic-upsell]");
          if (!trigger) return;
          event.preventDefault();
          event.stopImmediatePropagation();
          event.stopPropagation();
          window.dispatchEvent(new CustomEvent("landing:open-basic-upsell"));
        },
        true
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        const POLL_MS = 500;
        const UTM_SEP = "jLj";
        const XCOD_SEP = "hQwK21wXxR";

        const STORAGE_KEY = { FB: "lead", google: "lead-google" };

        function getOrigin(utmSource) {
          if (!utmSource) return null;
          const base = utmSource.split(UTM_SEP)[0];
          return base === "FB" || base === "google" ? base : null;
        }

        function getLeadIdFromStorage(origin) {
          const key = STORAGE_KEY[origin];
          if (!key) return null;
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          try {
            const obj = JSON.parse(raw);
            return obj && obj._id ? String(obj._id) : null;
          } catch {
            return null;
          }
        }

        function resolveLeadId(utmSource, origin) {
          const prefix = origin + UTM_SEP;
          if (utmSource && utmSource.startsWith(prefix)) {
            const id = utmSource.slice(prefix.length);
            if (id) return id;
          }
          return getLeadIdFromStorage(origin);
        }

        function applyIfNeeded() {
          const url = new URL(window.location.href);
          const currentSource = url.searchParams.get("utm_source");
          const origin = getOrigin(currentSource);
          if (!origin) return false;

          const id = resolveLeadId(currentSource, origin);
          if (!id) return false;

          const desired = origin + UTM_SEP + id;
          let changed = false;

          if (currentSource !== desired) {
            url.searchParams.set("utm_source", desired);
            changed = true;
          }

          const currentXcod = url.searchParams.get("xcod");
          if (currentXcod) {
            const parts = currentXcod.split(XCOD_SEP);
            if (parts[0] !== desired) {
              parts[0] = desired;
              url.searchParams.set("xcod", parts.join(XCOD_SEP));
              changed = true;
            }
          }

          if (!changed) return true;
          window.location.replace(url.toString());
          return true;
        }

        if (applyIfNeeded()) return;
        const interval = setInterval(() => {
          if (applyIfNeeded()) clearInterval(interval);
        }, POLL_MS);
      })();
    </script>
  </body>
</html>
